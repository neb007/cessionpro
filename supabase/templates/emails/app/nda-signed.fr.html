<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NDA signe</title>
  </head>
  <body style="margin:0;padding:0;background:#f7f7f7;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#f7f7f7;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" cellpadding="0" cellspacing="0" width="640" style="max-width:640px;background:#ffffff;border-radius:12px;border:1px solid #e6e6e6;overflow:hidden;">
            <tr>
              <td style="padding:24px 28px;background:#111111;color:#ffffff;font-family:Arial,sans-serif;">
                <h1 style="margin:0;font-size:20px;">Riviqo</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:28px;font-family:Arial,sans-serif;color:#111111;">
                <h2 style="margin:0 0 12px;font-size:20px;">Accord de confidentialite signe</h2>
                <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#2b2b2b;">Un accord de confidentialite a ete signe dans votre dossier.</p>
                <div style="margin:12px 0 18px;padding:12px;background:#f3f4f6;border-radius:8px;font-size:13px;color:#3a3a3a;">
                  <div><strong>Signataire:</strong> {{signer_name}}</div>
                </div>
                <a href="{{app_url}}/Messages" style="display:inline-block;padding:12px 18px;background:#111111;color:#ffffff;text-decoration:none;border-radius:8px;font-size:14px;">Voir le dossier</a>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 28px;background:#fafafa;border-top:1px solid #e6e6e6;font-family:Arial,sans-serif;font-size:12px;color:#6b7280;">
                Consultez votre messagerie pour plus de details.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
